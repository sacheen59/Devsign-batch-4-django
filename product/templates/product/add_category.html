<!doctype html>
{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}
Add Category
{% endblock %}

{% block main_content %}
    <div class="container">
        <div class="d-flex justify-content-center align-items-center">
            <div class="col-md-6">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary">Save</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
